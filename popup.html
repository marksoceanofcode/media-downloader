<html>
    <head>
        <title>Media Downloader</title>
        <link rel="stylesheet" type="text/css" href="style.css"/>
    </head>
    <body>
        <h2 class="">
            Media Downloader
        </h2>
        <div class="">
            <form name="download-options">
                <select name="types" id="mediaTypes">
                    <option id="0" value="" disabled selected>
                        Select a media target
                    </option>
                    <option id="01" value="og_image">
                        OG Image
                    </option>
                    <option id="02" value="og_video">
                        OG Video
                    </option>
                </select>
            </form> 
        </div>
        <div class="">
            <button id="downloadMediaBtn" class="">
                Download
            </button>
        </div>
        <div>
            <p id="status"></p>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
